name: CI (modules)



on:

  push:

    branches: ["main"]

  pull_request:

    branches: ["main"]

  workflow_dispatch:

    inputs:

      module:

        description: "Оберіть модуль для запуску (або all)"

        required: true

        default: "all"

        type: choice

        options: [all, data_load, data_quality_analysis, data_research, visualization]



jobs:

  run-modules:

    runs-on: ubuntu-latest

    strategy:

      fail-fast: false

      matrix:

        module: [data_load, data_quality_analysis, data_research, visualization]



    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0



      - name: Check for changes in module

        id: changed-files

        uses: tj-actions/changed-files@v42

        with:

          files: src/${{ matrix.module }}.py



      # FIX: Спрощено умову запуску (винесено в окрему змінну для зручності)

      - name: Set up Python

        if: |

          github.ref == 'refs/heads/main' ||

          steps.changed-files.outputs.any_changed == 'true' ||

          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

          cache: 'pip'



      - name: Install dependencies

        if: |

          github.ref == 'refs/heads/main' ||

          steps.changed-files.outputs.any_changed == 'true' ||

          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))

        run: |

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi



      - name: Run module

        if: |

          github.ref == 'refs/heads/main' ||

          steps.changed-files.outputs.any_changed == 'true' ||

          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))

        run: |

          # Створюємо структуру папок

          mkdir -p artifacts/${{ matrix.module }}/figures

          mkdir -p reports/figures

          

          echo "Запуск модуля ${{ matrix.module }}..."

          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1

          

          # FIX: Копіюємо безпечно (використовуємо -f та перевірку)

          cp *.png artifacts/${{ matrix.module }}/figures/ 2>/dev/null || true

          cp src/*.png artifacts/${{ matrix.module }}/figures/ 2>/dev/null || true

          if [ -d "reports/figures" ]; then cp reports/figures/*.png artifacts/${{ matrix.module }}/figures/ 2>/dev/null || true; fi

          if [ -d "reports" ]; then cp reports/*.md artifacts/${{ matrix.module }}/ 2>/dev/null || true; fi



      - name: Create HTML report for Pages

        if: matrix.module == 'visualization' && (github.ref == 'refs/heads/main' || steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch')

        run: |

          echo "<html><body style='font-family:sans-serif;padding:20px;'><h1>Visualization Results</h1>" > artifacts/${{ matrix.module }}/index.html

          echo "<p>BUILD DATE: $(date)</p><hr>" >> artifacts/${{ matrix.module }}/index.html

          # Перевірка наявності файлів перед циклом

          if [ -d "artifacts/${{ matrix.module }}/figures" ]; then

            for img in artifacts/${{ matrix.module }}/figures/*.png; do

              if [ -f "$img" ]; then

                fname=$(basename "$img")

                echo "<div><p>$fname</p><img src='figures/$fname' width='600'></div>" >> artifacts/${{ matrix.module }}/index.html

              fi

            done

          fi

          echo "</body></html>" >> artifacts/${{ matrix.module }}/index.html 



      - name: Upload artifacts

        if: |

          github.ref == 'refs/heads/main' ||

          steps.changed-files.outputs.any_changed == 'true' ||

          (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module))

        uses: actions/upload-artifact@v4

        with:

          name: artifacts-${{ matrix.module }}

          path: artifacts/${{ matrix.module }}/

          retention-days: 1



  deploy-pages:

    needs: run-modules

    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    permissions:

      contents: write

      pages: write

      id-token: write

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Download all artifacts

        uses: actions/download-artifact@v4

        with:

          path: temp_dir/

        continue-on-error: true



      - name: Prepare public folder

        run: |

          mkdir -p public

          

          if [ -d "temp_dir/artifacts-visualization" ]; then

            cp temp_dir/artifacts-visualization/index.html public/ 2>/dev/null || true

            cp -r temp_dir/artifacts-visualization/figures public/ 2>/dev/null || true

          fi

          

          if [ -d "temp_dir/artifacts-data_quality_analysis" ]; then

            cp temp_dir/artifacts-data_quality_analysis/data_quality_report.md public/ 2>/dev/null || true

          fi

          

          if [ -f "public/index.html" ] && [ -f "public/data_quality_report.md" ]; then

            sed -i 's|</body>|<hr><h3><a href="data_quality_report.md">Переглянути Data Quality Report</a></h3></body>|' public/index.html

          fi

          

          if [ ! -f "public/index.html" ]; then

            echo "<html><body><h1>Build successful</h1><p>Check artifacts for details.</p></body></html>" > public/index.html

          fi



      - name: Deploy to GitHub Pages

        uses: JamesIves/github-pages-deploy-action@v4

        with:

          folder: public/

          branch: gh-pages
