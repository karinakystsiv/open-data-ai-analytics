name: CI (self-hosted-mac)

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Оберіть модуль для запуску"
        required: true
        default: visualization
        type: choice
        options: [visualization, data_load, data_quality_analysis, data_research]

jobs:
  run-module-local:
    runs-on: [self-hosted, macOS, X64, local]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use system Python
        run: |
          python3 --version
          pip3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi

      - name: Pre-load Data
        run: |
          echo "Preparing data for the module..."
          python3 src/data_load.py

      - name: Run selected module
        run: |
          export MOD=${{ github.event.inputs.module }}
          mkdir -p artifacts/$MOD
          echo "Running $MOD on macOS self-hosted runner..."
          
          # Запускаємо обраний модуль (він уже знайде завантажені дані)
          python3 src/$MOD.py > artifacts/$MOD/run.log 2>&1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ github.event.inputs.module }}-selfhosted
          path: artifacts/${{ github.event.inputs.module }}
