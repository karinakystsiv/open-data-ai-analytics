apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/karinakystsiv/open-data-ai-analytics.git
    targetRevision: main
    path: gitops/app
  destination:
    server: https://kubernetes.default.svc
    namespace: analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true